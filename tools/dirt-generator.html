<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>污垢生成器</title>
<style>
  body { font-family: sans-serif; background: #f5f5f5; padding: 24px; }
  h1 { margin: 0 0 16px; }
  .row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
  .card { background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .card h3 { margin: 0 0 8px; }
  canvas { background: repeating-conic-gradient(#ddd 0% 25%, #fff 25% 50%) 50%/16px 16px; border-radius: 8px; display: block; }
  button { margin-top: 8px; padding: 8px 16px; border: 0; border-radius: 6px; background: #2196F3; color: #fff; cursor: pointer; font-size: 14px; }
  button:hover { background: #1976D2; }
  .controls { margin-bottom: 16px; padding: 16px; background: #fff; border-radius: 12px; }
  label { display: inline-block; margin-right: 16px; }
  input[type=number] { width: 60px; }
</style>
</head>
<body>

<h1>污垢生成器</h1>

<div class="controls">
  <label>尺寸: <input type="number" id="size" value="512" min="128" max="2048" step="64"></label>
  <label>污点数量倍率: <input type="number" id="density" value="1" min="0.2" max="3" step="0.1"></label>
  <button onclick="regenerateAll()">重新生成全部</button>
</div>

<div class="row" id="container"></div>

<script>
const TYPES = [
  {
    name: 'mud',
    label: '泥土',
    palette: [[110,70,40],[80,50,25],[140,90,55],[60,40,20],[90,60,35]],
    blobs: 280,
    blobMin: 6,
    blobMax: 30,
    alphaMin: 0.4,
    alphaMax: 0.85
  },
  {
    name: 'dust',
    label: '灰尘',
    palette: [[180,170,160],[150,140,130],[200,190,180],[120,110,100]],
    blobs: 400,
    blobMin: 2,
    blobMax: 12,
    alphaMin: 0.2,
    alphaMax: 0.5
  },
  {
    name: 'oil',
    label: '油污',
    palette: [[30,25,20],[50,40,30],[20,15,10],[70,55,40]],
    blobs: 180,
    blobMin: 8,
    blobMax: 40,
    alphaMin: 0.6,
    alphaMax: 0.95
  },
  {
    name: 'rust',
    label: '锈迹',
    palette: [[140,60,20],[180,80,30],[100,40,15],[120,50,18],[160,70,25]],
    blobs: 220,
    blobMin: 5,
    blobMax: 25,
    alphaMin: 0.4,
    alphaMax: 0.8
  },
  {
    name: 'water',
    label: '水渍',
    palette: [[180,170,140],[200,190,160],[160,150,120]],
    blobs: 60,
    blobMin: 30,
    blobMax: 80,
    alphaMin: 0.15,
    alphaMax: 0.35,
    ring: true
  },
  {
    name: 'soap',
    label: '泡沫',
    palette: [[230,235,240],[250,250,255],[210,220,230]],
    blobs: 350,
    blobMin: 4,
    blobMax: 18,
    alphaMin: 0.3,
    alphaMax: 0.6
  }
]

function generate(canvas, type, size, densityMul) {
  canvas.width = size
  canvas.height = size
  const ctx = canvas.getContext('2d')
  ctx.clearRect(0, 0, size, size)

  const blobCount = Math.floor(type.blobs * densityMul)
  for (let i = 0; i < blobCount; i++) {
    const x = Math.random() * size
    const y = Math.random() * size
    const r = type.blobMin + Math.random() * (type.blobMax - type.blobMin)
    const color = type.palette[Math.floor(Math.random() * type.palette.length)]
    const a = type.alphaMin + Math.random() * (type.alphaMax - type.alphaMin)
    if (type.ring && Math.random() < 0.4) {
      ctx.strokeStyle = `rgba(${color[0]},${color[1]},${color[2]},${a})`
      ctx.lineWidth = 2 + Math.random() * 4
      ctx.beginPath()
      ctx.arc(x, y, r, 0, Math.PI * 2)
      ctx.stroke()
    } else {
      const grad = ctx.createRadialGradient(x, y, 0, x, y, r)
      grad.addColorStop(0, `rgba(${color[0]},${color[1]},${color[2]},${a})`)
      grad.addColorStop(1, `rgba(${color[0]},${color[1]},${color[2]},0)`)
      ctx.fillStyle = grad
      ctx.beginPath()
      ctx.arc(x, y, r, 0, Math.PI * 2)
      ctx.fill()
    }
  }
}

function downloadCanvas(canvas, name) {
  const link = document.createElement('a')
  link.download = name + '.png'
  link.href = canvas.toDataURL('image/png')
  link.click()
}

function build() {
  const c = document.getElementById('container')
  c.innerHTML = ''
  const size = +document.getElementById('size').value
  const density = +document.getElementById('density').value
  for (const type of TYPES) {
    const card = document.createElement('div')
    card.className = 'card'
    const title = document.createElement('h3')
    title.textContent = type.label + ' (' + type.name + '.png)'
    const canvas = document.createElement('canvas')
    canvas.style.width = '160px'
    canvas.style.height = '160px'
    const dlBtn = document.createElement('button')
    dlBtn.textContent = '下载'
    dlBtn.onclick = () => downloadCanvas(canvas, type.name)
    const reBtn = document.createElement('button')
    reBtn.textContent = '重新生成'
    reBtn.style.marginLeft = '8px'
    reBtn.style.background = '#9e9e9e'
    reBtn.onclick = () => generate(canvas, type, size, density)
    card.appendChild(title)
    card.appendChild(canvas)
    card.appendChild(dlBtn)
    card.appendChild(reBtn)
    c.appendChild(card)
    generate(canvas, type, size, density)
  }
}

function regenerateAll() { build() }

build()
</script>

</body>
</html>
